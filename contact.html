        <h2>İletişim Formu</h2>
        <form>
            <div class="form-group">
                <label for="name">Ad Soyad</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div class="form-group">
                <label for="email">E-posta</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label>İlgi Alanları / Yetenekler:</label>
                <div class="checkbox-group">
                    <div>
                        <input type="checkbox" id="html" name="skills" value="HTML">
                        <label for="html">HTML</label>
                    </div>
                    <div>
                        <input type="checkbox" id="css" name="skills" value="CSS">
                        <label for="css">CSS</label>
                    </div>
                    <div>
                        <input type="checkbox" id="algoritma" name="skills" value="Algoritma">
                        <label for="algoritma">Algoritma</label>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="subject">Konu <span style="color: red;">*</span></label>
                <select id="subject" name="subject" required>
                    <option>Lütfen bir konu seçin...</option>
                    <option>İş Teklifi</option>
                    <option>Soru</option>
                    <option>Geri Bildirim</option>
                </select>
            </div>

            <div class="form-group">
                <label for="file">Özgeçmiş (CV) veya Fotoğraf Yükle:</label>
                <input type="file" id="file" name="file">
            </div>

            <div class="form-group">
                <label for="message">Mesajınız:</label>
                <textarea id="message" name="message" rows="5" placeholder="Detaylı mesajınızı buraya yazabilirsiniz..."></textarea>
            </div>

            <div class="form-buttons">
                <button type="submit">Gönder</button>
                <button type="reset">Temizle</button>
            </div>
        </form>
