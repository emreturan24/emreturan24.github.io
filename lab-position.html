<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Etkinlik Duyurusu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Fixed Menü -->
    <div class="fixed-menu">Duyuru Sayfası</div>

    <header>
        <h1>Üniversite Bahar Şenliği</h1>
    </header>

    <!-- Relative Kapsayıcı -->
    <div class="card-container">

        <img src="https://picsum.photos/600/300" class="card-img">

        <h2 class="card-title">Bahar Şenliği 2026</h2>

        <p class="card-text">
            Müzik, yemek ve eğlence dolu üniversite bahar şenliğine
            tüm öğrenciler davetlidir.
        </p>

        <!-- Absolute Etiketler -->
        <div class="tag tag1">Müzik</div>
        <div class="tag tag2">Yemek</div>
        <div class="tag tag3">Eğlence</div>

        <button class="join-btn">Katıl</button>

    </div>

    <footer>
        <p>© 2026 Üniversite Etkinliği</p>
    </footer>

</body>
</html>
